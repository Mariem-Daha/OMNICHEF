name: cuisinee
description: AI-powered cooking assistant for Mauritanian and MENA households

publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.6
  google_fonts: ^6.1.0
  flutter_animate: ^4.3.0
  flutter_svg: ^2.0.9
  cached_network_image: ^3.3.0
  provider: ^6.1.1
  shimmer: ^3.0.0
  flutter_staggered_grid_view: ^0.7.0
  percent_indicator: ^4.2.3
  http: ^1.2.0
  shared_preferences: ^2.2.2
  web_socket_channel: ^3.0.3
  # flutter_tts: ^4.2.5  # Temporarily disabled - causing NuGet issues on Windows
  record: ^6.2.0
  audioplayers: ^6.5.1
  path_provider: ^2.1.5
  permission_handler: ^12.0.1
  path: ^1.9.1
  # Vision AI — camera access for ingredient scanning, dish ID, and cooking companion
  camera: ^0.11.0+2
  camera_web: ^0.3.5   # web implementation of the camera plugin
  image_picker: ^1.1.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.1

flutter:
  uses-material-design: true
  
  assets:
    - assets/images/
    - assets/images/logo.png
    - assets/images/welcome_hero.png
    - assets/images/gemini_logo.png
    - assets/images/app_bg_logo.png
    - assets/icons/
    - assets/audio/
