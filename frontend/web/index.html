  <!--
    iOS Safari Audio Unlock
    Safari (and all browsers on iOS via WebKit) blocks audio until the user
    has interacted with the page. This one-shot handler plays a silent buffer
    to "unlock" both the Web Audio API context and the HTML <audio> element
    used by audioplayers_web, so AI voice responses play without user having
    to tap again.
  -->
  <script>
    (function() {
      var _audioUnlocked = false;
      function _unlockAudio() {
        if (_audioUnlocked) return;
        _audioUnlocked = true;

        // 1. Unlock HTML5 <audio> (used by audioplayers_web / BytesSource)
        var silent = new Audio();
        silent.play().catch(function() {});

        // 2. Pre-warm / unlock the CuisineeAudio playback context.
        //    On iOS, an AudioContext must be created AND have audio scheduled
        //    inside a user-gesture handler to start in 'running' state.
        //    Creating it lazily (outside a gesture) results in 'suspended',
        //    and resume() without a gesture fails on older iOS versions.
        var AC = window.AudioContext || window.webkitAudioContext;
        if (!AC) return;

        function _warmContext(ctx) {
          if (ctx.state === 'suspended') ctx.resume().catch(function(){});
          try {
            var buf = ctx.createBuffer(1, 1, ctx.sampleRate || 24000);
            var src = ctx.createBufferSource();
            src.buffer = buf;
            src.connect(ctx.destination);
            src.start(0);
          } catch(e) {}
        }

        if (window.CuisineeAudio) {
          // Flutter already loaded вЂ” pre-create the playback context in this gesture.
          if (!window.CuisineeAudio._playCtx ||
              window.CuisineeAudio._playCtx.state === 'closed') {
            window.CuisineeAudio._playCtx = new AC({ sampleRate: 24000 });
            window.CuisineeAudio._playTime = 0;
            window.CuisineeAudio._gainNode = null;
          }
          _warmContext(window.CuisineeAudio._playCtx);
        } else {
          // Flutter not yet loaded вЂ” create a temporary context to satisfy iOS,
          // and schedule a retry so CuisineeAudio gets warmed once available.
          var tmpCtx = new AC();
          _warmContext(tmpCtx);
          setTimeout(function() { try { tmpCtx.close(); } catch(e) {} }, 1000);
          // Retry warming CuisineeAudio up to 5 times (covers slow-loading pages).
          var retries = 0;
          function _retryCuisineeWarm() {
            if (window.CuisineeAudio) {
              if (!window.CuisineeAudio._playCtx ||
                  window.CuisineeAudio._playCtx.state === 'closed') {
                window.CuisineeAudio._playCtx = new AC({ sampleRate: 24000 });
                window.CuisineeAudio._playTime = 0;
                window.CuisineeAudio._gainNode = null;
              }
              // Note: resume() here is outside a gesture but the context was
              // pre-registered; on iOS 14.5+ resume() works without a gesture
              // once the page has been interacted with.
              window.CuisineeAudio._playCtx.resume().catch(function(){});
            } else if (++retries < 5) {
              setTimeout(_retryCuisineeWarm, 500);
            }
          }
          setTimeout(_retryCuisineeWarm, 200);
        }

        document.removeEventListener('touchstart',  _unlockAudio, true);
        document.removeEventListener('touchend',    _unlockAudio, true);
        document.removeEventListener('pointerdown', _unlockAudio, true);
        document.removeEventListener('click',       _unlockAudio, true);
      }
      document.addEventListener('touchstart',  _unlockAudio, true);
      document.addEventListener('touchend',    _unlockAudio, true);
      document.addEventListener('pointerdown', _unlockAudio, true);
      document.addEventListener('click',       _unlockAudio, true);

      // Persistent re-resume: covers iOS returning from sleep or tab-switch
      // (the OS suspends AudioContexts when the page loses focus).
      function _reResumeAudio() {
        var ca = window.CuisineeAudio;
        if (ca && ca._playCtx && ca._playCtx.state === 'suspended') {
          ca._playCtx.resume().catch(function() {});
        }
      }
      document.addEventListener('touchstart', _reResumeAudio, { passive: true });
      document.addEventListener('pointerdown', _reResumeAudio, { passive: true });
    })();
  </script>

  <script>
    window.CuisineeAudio = {
      // ГўвЂќв‚¬ГўвЂќв‚¬ internal ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬

      _SPEECH_THRESHOLD: 0.003,  // float32 RMS threshold for VAD

      // ГўвЂќв‚¬ГўвЂќв‚¬ Microphone ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬
      // Called by Dart: starts mic, pushes chunks to Dart via postMessage.
      async startMic() {
        try {
          // Try progressively simpler constraints вЂ” older iOS Safari rejects some.
          const constraintOptions = [
            { audio: { channelCount: 1, echoCancellation: true, noiseSuppression: true, autoGainControl: true } },
            { audio: { channelCount: 1 } },
            { audio: true },
          ];
          let stream = null;
          let lastErr = null;
          for (const c of constraintOptions) {
            try { stream = await navigator.mediaDevices.getUserMedia(c); break; }
            catch (e) { lastErr = e; }
          }
          if (!stream) throw lastErr || new Error('getUserMedia failed');

          this._micStream = stream;
          this._micCtx = new (window.AudioContext || window.webkitAudioContext)();
          const nativeRate   = this._micCtx.sampleRate;
          const targetRate   = 16000;
          const downRatio    = nativeRate / targetRate;

          const source    = this._micCtx.createMediaStreamSource(stream);
          const bufSize   = 4096;
          this._processor = this._micCtx.createScriptProcessor(bufSize, 1, 1);

          let wasSpeaking = false;

          this._processor.onaudioprocess = (e) => {
            const input = e.inputBuffer.getChannelData(0);

            // Simple energy VAD
            let energy = 0;
            for (let i = 0; i < input.length; i++) energy += input[i] * input[i];
            energy /= input.length;
            const speaking = energy > this._SPEECH_THRESHOLD;
            if (speaking !== wasSpeaking) {
              wasSpeaking = speaking;
              window.postMessage({ source: 'CuisineeAudio', type: 'vad', speaking }, '*');
            }

            // Downsample to 16 kHz
            const outLen = Math.round(input.length / downRatio);
            const out    = new Float32Array(outLen);
            for (let i = 0; i < outLen; i++) out[i] = input[Math.round(i * downRatio)];

            // Float32 ГўвЂ вЂ™ Int16 PCM
            const int16 = new Int16Array(outLen);
            for (let i = 0; i < outLen; i++) {
              const s = Math.max(-1, Math.min(1, out[i]));
              int16[i] = s < 0 ? s * 32768 : s * 32767;
            }

            // Base64-encode and post to Dart
            const bytes = new Uint8Array(int16.buffer);
            let b = '';
            for (let i = 0; i < bytes.length; i += 8192) {
              b += String.fromCharCode.apply(null, bytes.subarray(i, i + 8192));
            }
            window.postMessage({ source: 'CuisineeAudio', type: 'mic_chunk', data: btoa(b) }, '*');
          };

          source.connect(this._processor);
          this._processor.connect(this._micCtx.destination);
          console.log('[CuisineeAudio] Mic started Гўв‚¬вЂќ native=' + nativeRate + 'Hz ГўвЂ вЂ™ 16000Hz');
          return true;
        } catch (err) {
          console.error('[CuisineeAudio] Mic error:', err);
          window.postMessage({ source: 'CuisineeAudio', type: 'mic_error', error: err.message }, '*');
          return false;
        }
      },

      stopMic() {
        if (this._processor)  { this._processor.disconnect(); this._processor = null; }
        if (this._micStream)  { this._micStream.getTracks().forEach(t => t.stop()); this._micStream = null; }
        if (this._micCtx)     { try { this._micCtx.close(); } catch(_) {} this._micCtx = null; }
        console.log('[CuisineeAudio] Mic stopped');
      },

      // ГўвЂќв‚¬ГўвЂќв‚¬ Playback ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬
      // Called by Dart with each received PCM chunk (base64, 24 kHz, Int16).
      async playPcmChunk(base64) {
        if (this._interrupted) return;

        if (!this._playCtx || this._playCtx.state === 'closed') {
          this._playCtx = new (window.AudioContext || window.webkitAudioContext)({ sampleRate: 24000 });
          this._playTime = 0;
          this._gainNode = null;  // reset so it's recreated for the new context
        }
        // iOS: a context created outside a user-gesture starts as 'suspended'.
        // Await resume() so buffers are only scheduled on a running context вЂ”
        // without this, src.start() is silently ignored on iOS Safari/Chrome.
        if (this._playCtx.state === 'suspended') {
          try { await this._playCtx.resume(); } catch(_) {}
        }

        // Route all audio through a shared GainNode.  interrupt() zeros it
        // instantly without closing (and losing) the iOS-unlocked context.
        if (!this._gainNode) {
          this._gainNode = this._playCtx.createGain();
          this._gainNode.connect(this._playCtx.destination);
        }

        try {
          const bin  = atob(base64);
          const u8   = new Uint8Array(bin.length);
          for (let i = 0; i < bin.length; i++) u8[i] = bin.charCodeAt(i);

          const int16   = new Int16Array(u8.buffer);
          const float32 = new Float32Array(int16.length);
          for (let i = 0; i < int16.length; i++) float32[i] = int16[i] / 32768.0;

          const buf = this._playCtx.createBuffer(1, float32.length, 24000);
          buf.copyToChannel(float32, 0);

          const src = this._playCtx.createBufferSource();
          src.buffer = buf;
          src.connect(this._gainNode);  // route through gain node

          const now   = this._playCtx.currentTime;
          const start = (this._playTime < now + 0.01) ? now + 0.02 : this._playTime;
          src.start(start);
          this._playTime = start + buf.duration;
          this._isSpeaking = true;

          if (this._silenceTimer) clearTimeout(this._silenceTimer);
          this._silenceTimer = setTimeout(() => {
            if (this._playCtx && this._playTime <= this._playCtx.currentTime + 0.05) {
              this._isSpeaking = false;
              window.postMessage({ source: 'CuisineeAudio', type: 'speak_end' }, '*');
            }
          }, Math.ceil((buf.duration + 0.25) * 1000));

        } catch (err) {
          console.error('[CuisineeAudio] Playback error:', err);
        }
      },

      interrupt() {
        this._interrupted = true;
        this._isSpeaking  = false;
        this._playTime    = 0;
        // Mute via GainNode вЂ” do NOT close AudioContext.
        // Closing destroys the iOS gesture-unlock: any new context created
        // outside a gesture will start in 'suspended' state and produce silence.
        if (this._gainNode && this._playCtx) {
          try { this._gainNode.gain.cancelScheduledValues(0); } catch(_) {}
          try { this._gainNode.gain.setValueAtTime(0, this._playCtx.currentTime); } catch(_) {}
        }
        setTimeout(() => {
          this._interrupted = false;
          // Restore volume for the next AI response.
          if (this._gainNode && this._playCtx) {
            try { this._gainNode.gain.setValueAtTime(1, this._playCtx.currentTime); } catch(_) {}
          }
        }, 400);
      },

      isSpeaking() {
        if (!this._playCtx) return false;
        return this._isSpeaking && (this._playTime > this._playCtx.currentTime + 0.05);
      },

      async resumePlayback() {
        if (this._playCtx && this._playCtx.state === 'suspended') {
          try { await this._playCtx.resume(); } catch(_) {}
        }
      }
    };
