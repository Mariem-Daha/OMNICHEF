  <!-- ═══════════════════════════════════════════════════════════════════════
       Cuisinee Web Audio Engine  v2
       - Mic capture: downsample native rate → 16 kHz PCM, send via postMessage
       - Playback: gapless scheduled AudioBufferSourceNode at 24 kHz
       - All Dart↔JS comms use window.postMessage (no allowInterop needed)
  ════════════════════════════════════════════════════════════════════════ -->
  <script>
    window.CuisineeAudio = {
      // ── internal ────────────────────────────────────────────────────────
      _micCtx:    null,
      _micStream: null,
      _processor: null,

      _playCtx:     null,
      _playTime:    0,
      _interrupted: false,
      _isSpeaking:  false,
      _silenceTimer: null,

      _SPEECH_THRESHOLD: 0.003,  // float32 RMS threshold for VAD

      // ── Microphone ──────────────────────────────────────────────────────
      // Called by Dart: starts mic, pushes chunks to Dart via postMessage.
      async startMic() {
        try {
          const stream = await navigator.mediaDevices.getUserMedia({
            audio: {
              channelCount:     1,
              echoCancellation: true,
              noiseSuppression: true,
              autoGainControl:  true,
            }
          });
          this._micStream = stream;
          this._micCtx = new (window.AudioContext || window.webkitAudioContext)();
          const nativeRate   = this._micCtx.sampleRate;
          const targetRate   = 16000;
          const downRatio    = nativeRate / targetRate;

          const source    = this._micCtx.createMediaStreamSource(stream);
          const bufSize   = 4096;
          this._processor = this._micCtx.createScriptProcessor(bufSize, 1, 1);

          let wasSpeaking = false;

          this._processor.onaudioprocess = (e) => {
            const input = e.inputBuffer.getChannelData(0);

            // Simple energy VAD
            let energy = 0;
            for (let i = 0; i < input.length; i++) energy += input[i] * input[i];
            energy /= input.length;
            const speaking = energy > this._SPEECH_THRESHOLD;
            if (speaking !== wasSpeaking) {
              wasSpeaking = speaking;
              window.postMessage({ source: 'CuisineeAudio', type: 'vad', speaking }, '*');
            }

            // Downsample to 16 kHz
            const outLen = Math.round(input.length / downRatio);
            const out    = new Float32Array(outLen);
            for (let i = 0; i < outLen; i++) out[i] = input[Math.round(i * downRatio)];

            // Float32 → Int16 PCM
            const int16 = new Int16Array(outLen);
            for (let i = 0; i < outLen; i++) {
              const s = Math.max(-1, Math.min(1, out[i]));
              int16[i] = s < 0 ? s * 32768 : s * 32767;
            }

            // Base64-encode and post to Dart
            const bytes = new Uint8Array(int16.buffer);
            let b = '';
            for (let i = 0; i < bytes.length; i += 8192) {
              b += String.fromCharCode.apply(null, bytes.subarray(i, i + 8192));
            }
            window.postMessage({ source: 'CuisineeAudio', type: 'mic_chunk', data: btoa(b) }, '*');
          };

          source.connect(this._processor);
          this._processor.connect(this._micCtx.destination);
          console.log('[CuisineeAudio] Mic started — native=' + nativeRate + 'Hz → 16000Hz');
          return true;
        } catch (err) {
          console.error('[CuisineeAudio] Mic error:', err);
          window.postMessage({ source: 'CuisineeAudio', type: 'mic_error', error: err.message }, '*');
          return false;
        }
      },

      stopMic() {
        if (this._processor)  { this._processor.disconnect(); this._processor = null; }
        if (this._micStream)  { this._micStream.getTracks().forEach(t => t.stop()); this._micStream = null; }
        if (this._micCtx)     { try { this._micCtx.close(); } catch(_) {} this._micCtx = null; }
        console.log('[CuisineeAudio] Mic stopped');
      },

      // ── Playback ────────────────────────────────────────────────────────
      // Called by Dart with each received PCM chunk (base64, 24 kHz, Int16).
      playPcmChunk(base64) {
        if (this._interrupted) return;

        if (!this._playCtx || this._playCtx.state === 'closed') {
          this._playCtx = new (window.AudioContext || window.webkitAudioContext)({ sampleRate: 24000 });
          this._playTime = 0;
        }
        if (this._playCtx.state === 'suspended') this._playCtx.resume();

        try {
          const bin  = atob(base64);
          const u8   = new Uint8Array(bin.length);
          for (let i = 0; i < bin.length; i++) u8[i] = bin.charCodeAt(i);

          const int16   = new Int16Array(u8.buffer);
          const float32 = new Float32Array(int16.length);
          for (let i = 0; i < int16.length; i++) float32[i] = int16[i] / 32768.0;

          const buf = this._playCtx.createBuffer(1, float32.length, 24000);
          buf.copyToChannel(float32, 0);

          const src = this._playCtx.createBufferSource();
          src.buffer = buf;
          src.connect(this._playCtx.destination);

          const now   = this._playCtx.currentTime;
          const start = (this._playTime < now + 0.01) ? now + 0.02 : this._playTime;
          src.start(start);
          this._playTime = start + buf.duration;
          this._isSpeaking = true;

          if (this._silenceTimer) clearTimeout(this._silenceTimer);
          this._silenceTimer = setTimeout(() => {
            if (this._playCtx && this._playTime <= this._playCtx.currentTime + 0.05) {
              this._isSpeaking = false;
              window.postMessage({ source: 'CuisineeAudio', type: 'speak_end' }, '*');
            }
          }, Math.ceil((buf.duration + 0.25) * 1000));

        } catch (err) {
          console.error('[CuisineeAudio] Playback error:', err);
        }
      },

      interrupt() {
        this._interrupted = true;
        this._isSpeaking  = false;
        this._playTime    = 0;
        if (this._playCtx) {
          try { this._playCtx.close(); } catch(_) {}
          this._playCtx = null;
        }
        setTimeout(() => { this._interrupted = false; }, 400);
      },

      isSpeaking() {
        if (!this._playCtx) return false;
        return this._isSpeaking && (this._playTime > this._playCtx.currentTime + 0.05);
      },

      resumePlayback() {
        if (this._playCtx && this._playCtx.state === 'suspended') this._playCtx.resume();
      }
    };
  </script>

  <script>
    window.CuisineeAudio = {
      // ── internal state ──────────────────────────────────────────────────
      _micCtx:      null,
      _micStream:   null,
      _processor:   null,
      _onChunk:     null,   // Dart callback: fn(base64String)
      _onSpeech:    null,   // Dart callback: fn(bool isSpeaking)

      _playCtx:     null,
      _playTime:    0,
      _interrupted: false,
      _isSpeaking:  false,
      _silenceTimer: null,

      // Energy threshold for VAD (0-1 range, float32)
      _SPEECH_THRESHOLD: 0.003,

      // ── Microphone ──────────────────────────────────────────────────────
      async startMic(onChunkFn, onSpeechFn) {
        this._onChunk  = onChunkFn;
        this._onSpeech = onSpeechFn;
        try {
          const stream = await navigator.mediaDevices.getUserMedia({
            audio: {
              channelCount:      1,
              echoCancellation:  true,
              noiseSuppression:  true,
              autoGainControl:   true,
            }
          });
          this._micStream = stream;
          // Create AudioContext at the browser's native sample rate
          this._micCtx = new (window.AudioContext || window.webkitAudioContext)();
          const nativeRate    = this._micCtx.sampleRate;
          const targetRate    = 16000;
          const downsampleRatio = nativeRate / targetRate;

          const source     = this._micCtx.createMediaStreamSource(stream);
          const bufferSize = 4096;
          this._processor  = this._micCtx.createScriptProcessor(bufferSize, 1, 1);

          let _wasSpeaking = false;

          this._processor.onaudioprocess = (e) => {
            if (!this._onChunk) return;
            const input = e.inputBuffer.getChannelData(0); // Float32Array @ nativeRate

            // ── Simple energy VAD ──
            let energy = 0;
            for (let i = 0; i < input.length; i++) energy += input[i] * input[i];
            energy /= input.length;
            const speaking = energy > this._SPEECH_THRESHOLD;
            if (speaking !== _wasSpeaking) {
              _wasSpeaking = speaking;
              if (this._onSpeech) this._onSpeech(speaking);
            }

            // ── Downsample to 16 kHz ──
            const outputLen = Math.round(input.length / downsampleRatio);
            const output    = new Float32Array(outputLen);
            for (let i = 0; i < outputLen; i++) {
              output[i] = input[Math.round(i * downsampleRatio)];
            }

            // ── Float32 → Int16 PCM ──
            const int16 = new Int16Array(outputLen);
            for (let i = 0; i < outputLen; i++) {
              const s = Math.max(-1, Math.min(1, output[i]));
              int16[i] = s < 0 ? s * 32768 : s * 32767;
            }

            // ── Base64 encode & callback ──
            const bytes = new Uint8Array(int16.buffer);
            let b = '';
            // Chunked to avoid call stack overflow on large buffers
            for (let i = 0; i < bytes.length; i += 8192) {
              b += String.fromCharCode.apply(null, bytes.subarray(i, i + 8192));
            }
            try { this._onChunk(btoa(b)); } catch(_) {}
          };

          source.connect(this._processor);
          this._processor.connect(this._micCtx.destination);
          console.log('[CuisineeAudio] Mic started — native=' + nativeRate + 'Hz → 16000Hz');
          return true;
        } catch (err) {
          console.error('[CuisineeAudio] Mic start error:', err);
          return false;
        }
      },

      stopMic() {
        if (this._processor)  { this._processor.disconnect();  this._processor  = null; }
        if (this._micStream)  { this._micStream.getTracks().forEach(t => t.stop()); this._micStream = null; }
        if (this._micCtx)     { this._micCtx.close();           this._micCtx     = null; }
        this._onChunk  = null;
        this._onSpeech = null;
        console.log('[CuisineeAudio] Mic stopped');
      },

      // ── Playback ────────────────────────────────────────────────────────
      // Receive a stream of PCM-16bit 24 kHz base64 chunks and play them
      // gaplessly using scheduled AudioBufferSourceNodes.
      playPcmChunk(base64) {
        if (this._interrupted) return;

        // Lazy-create / resume playback context at 24 kHz
        if (!this._playCtx || this._playCtx.state === 'closed') {
          this._playCtx = new (window.AudioContext || window.webkitAudioContext)({ sampleRate: 24000 });
          this._playTime = 0;
        }
        if (this._playCtx.state === 'suspended') this._playCtx.resume();

        try {
          // Decode base64 → bytes → Int16 → Float32
          const bin  = atob(base64);
          const u8   = new Uint8Array(bin.length);
          for (let i = 0; i < bin.length; i++) u8[i] = bin.charCodeAt(i);

          const int16   = new Int16Array(u8.buffer);
          const float32 = new Float32Array(int16.length);
          for (let i = 0; i < int16.length; i++) float32[i] = int16[i] / 32768.0;

          const audioBuf = this._playCtx.createBuffer(1, float32.length, 24000);
          audioBuf.copyToChannel(float32, 0);

          const src = this._playCtx.createBufferSource();
          src.buffer = audioBuf;
          src.connect(this._playCtx.destination);

          // Schedule gaplessly: if playback has fallen behind, restart from now+20ms
          const now   = this._playCtx.currentTime;
          const start = (this._playTime < now + 0.01) ? now + 0.02 : this._playTime;
          src.start(start);
          this._playTime = start + audioBuf.duration;
          this._isSpeaking = true;

          // Reset silence timer
          if (this._silenceTimer) clearTimeout(this._silenceTimer);
          this._silenceTimer = setTimeout(() => {
            if (!this._playCtx) return;
            if (this._playTime <= this._playCtx.currentTime + 0.05) {
              this._isSpeaking = false;
            }
          }, Math.ceil((audioBuf.duration + 0.2) * 1000));

        } catch (err) {
          console.error('[CuisineeAudio] Playback error:', err);
        }
      },

      // Stop AI audio immediately (barge-in)
      interrupt() {
        this._interrupted = true;
        this._isSpeaking  = false;
        this._playTime    = 0;
        if (this._playCtx) {
          try { this._playCtx.close(); } catch(_) {}
          this._playCtx = null;
        }
        // Re-enable after 400ms so new AI audio can play
        setTimeout(() => { this._interrupted = false; }, 400);
      },

      isSpeaking() {
        if (!this._playCtx) return false;
        return this._isSpeaking && (this._playTime > this._playCtx.currentTime + 0.05);
      },

      // Resume AudioContext (required after user gesture on iOS/Chrome)
      resumePlayback() {
        if (this._playCtx && this._playCtx.state === 'suspended') this._playCtx.resume();
      }
    };
  </script>
